      const firebaseConfig = {

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.__firebase = { db, collection, doc, setDoc, deleteDoc, onSnapshot };
      return window.__firebase;

    });

const hoje = () => new Date().toISOString().split("T")[0];
const dataLocal = d => new Date(d + "T12:00:00");
const addDiasUteis = (data, dias=7) => {
  if(!data) return "";
  const dt = dataLocal(data);
  let adicionados = 0;
  while(adicionados < dias){
    dt.setDate(dt.getDate()+1);
    const sem = dt.getDay();
    if(sem !== 0 && sem !== 6) adicionados++;
  }
  return dt.toISOString().split("T")[0];
};

const getFirebase = async () => {
  if (window.__firebase) return window.__firebase;
  if (window.__firebaseReady) {
    const fb = await window.__firebaseReady;
    if (fb) return fb;
  }
  throw new Error("Firebase não carregou. Verifique a conexão e as configurações do projeto.");
};

const savePedido = async (p) => {
  const { db, doc, setDoc } = await getFirebase();
  await setDoc(doc(db, "pedidos", p.id), p);
};
const deletePedido = async (id) => {
  const { db, doc, deleteDoc } = await getFirebase();
  await deleteDoc(doc(db, "pedidos", id));
};
const saveUsers = async (u) => {
  const { db, doc, setDoc } = await getFirebase();
  await setDoc(doc(db, "config", "users"), { data: JSON.stringify(u) });
};
 
function Inp({label,style:s,...p}){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {label&&<label style={{fontSize:12,fontWeight:600,color:C.g600,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>}
      <input {...p} onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.g200}
        style={{padding:"9px 12px",borderRadius:8,border:"1.5px solid "+C.g200,outline:"none",
          fontFamily:"inherit",fontSize:14,color:C.g800,background:C.white,...s}}/>
    </div>
  );
}
function Sel({label,options,...p}){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {label&&<label style={{fontSize:12,fontWeight:600,color:C.g600,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>}
      <select {...p} onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.g200}
        style={{padding:"9px 12px",borderRadius:8,border:"1.5px solid "+C.g200,outline:"none",
          fontFamily:"inherit",fontSize:14,color:C.g800,background:C.white,cursor:"pointer"}}>
        {options.map(o=><option key={o.v||o} value={o.v||o}>{o.t||o}</option>)}
      </select>
    </div>
  );
}
function Btn({children,v="pri",sm,style:s,...p}){
  const vs={pri:{background:C.navy,color:C.white,border:"none"},gold:{background:C.gold,color:C.navy,border:"none"},
    out:{background:"transparent",color:C.navy,border:"1.5px solid "+C.navy},
    dan:{background:"transparent",color:C.red,border:"1.5px solid "+C.red},
    gh:{background:C.g100,color:C.g800,border:"none"}};
  return <button {...p} onMouseEnter={e=>e.currentTarget.style.opacity=".82"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}
    style={{padding:sm?"5px 12px":"9px 18px",borderRadius:8,fontFamily:"inherit",fontWeight:600,fontSize:sm?12:14,
      cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6,transition:"opacity .15s",...vs[v],...s}}>{children}</button>;
}

    fontSize:12,fontWeight:600,color:s.c,background:s.bg,border:"1px solid "+s.c+"44",whiteSpace:"nowrap"}}>{s.i} {s.l}</span>;
}
function Modal({title,onClose,children}){
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,zIndex:1000,
      background:"rgba(15,36,69,.6)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.white,borderRadius:16,width:"100%",maxWidth:640,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,.3)"}}>
        <div style={{padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.navy,borderRadius:"14px 14px 0 0"}}>
          <span style={{fontWeight:700,fontSize:16,color:C.white}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.g400,lineHeight:1}}>×</button>
        </div>
        <div style={{padding:24}}>{children}</div>
      </div>
    </div>
  );
}
function Kpi({label,valor,icon,cor,sub}){
  return (
    <div style={{background:C.white,borderRadius:12,padding:"16px 20px",border:"1.5px solid "+cor+"33",display:"flex",alignItems:"center",gap:14}}>
      <div style={{fontSize:24,background:cor+"18",borderRadius:10,width:46,height:46,display:"flex",alignItems:"center",justifyContent:"center"}}>{icon}</div>
      <div>
        <div style={{fontSize:11,color:C.g600,fontWeight:600,textTransform:"uppercase",letterSpacing:.8}}>{label}</div>
        <div style={{fontSize:20,fontWeight:700,color:cor}}>{valor}</div>
        {sub&&<div style={{fontSize:11,color:C.g600}}>{sub}</div>}
      </div>
    </div>
  );
}
function MsgBox({msg,tipo="ok"}){
  if(!msg) return null;
  const cfg={ok:{bg:C.greenL,border:C.green,color:C.green,icon:"✅"},err:{bg:C.redL,border:C.red,color:C.red,icon:"⚠️"}};
  const c=cfg[tipo]||cfg.ok;
  return <div style={{background:c.bg,border:"1.5px solid "+c.border+"66",borderRadius:10,padding:"12px 16px",
    fontSize:13,fontWeight:600,color:c.color,display:"flex",alignItems:"center",gap:8}}>{c.icon} {msg}</div>;
}
 
function Login({onLogin,users}){
  const [login,setLogin]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const entrar=()=>{
    const u=users[login.trim().toLowerCase()];
    if(u&&u.pass===pass) onLogin({login:login.trim().toLowerCase(),name:u.name,role:u.role});
    else setErr("Usuário ou senha incorretos.");
  };
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,"+C.navy+" 0%,"+C.navyL+" 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.white,borderRadius:20,padding:40,width:"100%",maxWidth:400,boxShadow:"0 32px 80px rgba(0,0,0,.35)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <img src={"data:image/png;base64,"+LOGO} alt="RBE Select" style={{height:90,width:"auto",objectFit:"contain",marginBottom:12}}/>
          <div style={{fontSize:12,color:C.g600,letterSpacing:1,textTransform:"uppercase"}}>Sistema de Gestão</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Inp label="Usuário" value={login} onChange={e=>{setLogin(e.target.value);setErr("");}} placeholder="Digite seu usuário" onKeyDown={e=>e.key==="Enter"&&entrar()}/>
          <Inp label="Senha" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} placeholder="Digite sua senha" onKeyDown={e=>e.key==="Enter"&&entrar()}/>
          {err&&<MsgBox msg={err} tipo="err"/>}
          <Btn v="gold" onClick={entrar} style={{justifyContent:"center",padding:"12px",fontSize:15}}>🔐 Entrar</Btn>
        </div>
      </div>
    </div>
  );
}
 
function Configuracoes({users,onSave}){
  const [u,setU]=useState(JSON.parse(JSON.stringify(users)));
  const [nLogin,setNLogin]=useState(""); const [nNome,setNNome]=useState("");
  const [nSenha,setNSenha]=useState(""); const [nPerfil,setNPerfil]=useState("operador"); const [nWhats,setNWhats]=useState("");
  const [msg,setMsg]=useState(""); const [msgTipo,setMsgTipo]=useState("ok");
  const [errNovo,setErrNovo]=useState("");
  const salvar=async(dados)=>{
    const final=dados||u;
    try{await saveUsers(final);}catch(e){console.error(e);}
    onSave(final); setMsg("Salvo!"); setMsgTipo("ok"); setTimeout(()=>setMsg(""),3000);
  };
  const atualizar=(key,field,val)=>setU(prev=>({...prev,[key]:{...prev[key],[field]:val}}));
  const criar=()=>{
    setErrNovo("");
    const l=nLogin.trim().toLowerCase().replace(/\s+/g,"");
    if(!l){setErrNovo("Informe o login.");return;}
    if(!nNome.trim()){setErrNovo("Informe o nome.");return;}
    if(!nSenha){setErrNovo("Informe a senha.");return;}
    if(u[l]){setErrNovo("Login já existe.");return;}
    const novo={...u,[l]:{name:nNome.trim(),role:nPerfil,pass:nSenha,whatsapp:nWhats.trim()}};
    setU(novo); salvar(novo); setNLogin(""); setNNome(""); setNSenha(""); setNWhats(""); setNPerfil("operador");
  };
  const excluir=(key)=>{
    if(key==="admin"){alert("O admin não pode ser excluído.");return;}
    if(!window.confirm("Excluir "+u[key].name+"?"))return;
    const novo={...u}; delete novo[key]; setU(novo); salvar(novo);
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:700}}>
      <div style={{background:C.navy,borderRadius:14,padding:24}}>
        <div style={{fontWeight:700,fontSize:16,color:C.white,marginBottom:18}}>➕ Criar Novo Usuário</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Login" value={nLogin} onChange={e=>setNLogin(e.target.value)} placeholder="ex: joana" style={{background:"#1e3f6e",color:C.white,borderColor:"#ffffff22"}}/>
          <Inp label="Nome" value={nNome} onChange={e=>setNNome(e.target.value)} placeholder="ex: Joana Silva" style={{background:"#1e3f6e",color:C.white,borderColor:"#ffffff22"}}/>
          <Inp label="Senha" type="password" value={nSenha} onChange={e=>setNSenha(e.target.value)} placeholder="Defina uma senha" style={{background:"#1e3f6e",color:C.white,borderColor:"#ffffff22"}}/>
          <Inp label="WhatsApp" value={nWhats} onChange={e=>setNWhats(e.target.value)} placeholder="(22) 99999-9999" style={{background:"#1e3f6e",color:C.white,borderColor:"#ffffff22"}}/>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <label style={{fontSize:12,fontWeight:600,color:"#ffffffaa",textTransform:"uppercase",letterSpacing:.5}}>Perfil</label>
            <select value={nPerfil} onChange={e=>setNPerfil(e.target.value)}
              style={{padding:"9px 12px",borderRadius:8,border:"1.5px solid #ffffff22",fontFamily:"inherit",fontSize:14,background:"#1e3f6e",color:C.white,cursor:"pointer",outline:"none"}}>
              <option value="operador">👤 Operador</option>
              <option value="admin">👑 Admin</option>
            </select>
          </div>
        </div>
        {errNovo&&<div style={{marginTop:12}}><MsgBox msg={errNovo} tipo="err"/></div>}
        <div style={{marginTop:16}}><Btn v="gold" onClick={criar}>✅ Criar Usuário</Btn></div>
      </div>
      <div style={{fontWeight:700,fontSize:16,color:C.navy}}>👥 Usuários Cadastrados</div>
      {Object.entries(u).map(([key,val])=>(
        <div key={key} style={{background:C.g50,borderRadius:12,padding:20,border:"1px solid "+C.g200}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,fontSize:15,color:C.navy}}>{val.role==="admin"?"👑":"👤"} {val.name}</span>
              <span style={{fontSize:11,color:C.g600,background:C.g200,padding:"2px 8px",borderRadius:10}}>login: {key}</span>
            </div>
            {key!=="admin"&&<Btn sm v="dan" onClick={()=>excluir(key)}>🗑️ Excluir</Btn>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Inp label="Nome" value={val.name||""} onChange={e=>atualizar(key,"name",e.target.value)}/>
            <Inp label="WhatsApp" value={val.whatsapp||""} onChange={e=>atualizar(key,"whatsapp",e.target.value)} placeholder="(22) 99999-9999"/>
            <Inp label="Nova senha" type="password" value={val.pass||""} onChange={e=>atualizar(key,"pass",e.target.value)} placeholder="Alterar senha"/>
          </div>
        </div>
      ))}
      <MsgBox msg={msg} tipo={msgTipo}/>
      <div><Btn v="gold" onClick={()=>salvar()}>💾 Salvar Alterações</Btn></div>
    </div>
  );
}
 
const VAZIO={id:"",nome:"",idade:"",tel:"",email:"",cidade:"",dataPed:hoje(),prazo:"",
  servico:SERVICOS[0],valor:PRECOS[SERVICOS[0]],desc:0,forma:"Pix",
  stPgto:"Pendente",stServ:"Aguardando",entregaReal:"",obs:"",indicado:"",operador:""};
 
function FormPedido({ini,onSave,onCancel,currentUser}){
  const [f,setF]=useState(()=>ini||{...VAZIO,id:uid(),dataPed:hoje(),prazo:addDiasUteis(hoje(),7),operador:currentUser?.name||""});
  const set=(k,v)=>setF(p=>{
    const novo={...p,[k]:v};
    if(k==="dataPed") novo.prazo=addDiasUteis(v,7);
    return novo;
  });
  const vf=Number(f.valor||0)-Number(f.desc||0);
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{background:C.g50,borderRadius:10,padding:16}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>👤 Dados do Cliente</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}><Inp label="Nome completo *" value={f.nome} onChange={e=>set("nome",e.target.value)} placeholder="Ex: Maria Silva"/></div>
          <Inp label="Idade" type="number" value={f.idade} onChange={e=>set("idade",e.target.value)} placeholder="Ex: 32"/>
          <Inp label="Telefone / WhatsApp" value={f.tel} onChange={e=>set("tel",e.target.value)} placeholder="(11) 99999-0000"/>
          <Inp label="E-mail" type="email" value={f.email} onChange={e=>set("email",e.target.value)} placeholder="cliente@email.com"/>
          <Inp label="Cidade / UF" value={f.cidade} onChange={e=>set("cidade",e.target.value)} placeholder="São Paulo / SP"/>
          <Inp label="Indicado por" value={f.indicado} onChange={e=>set("indicado",e.target.value)} placeholder="Instagram, indicação..."/>
          <div style={{gridColumn:"1/-1"}}><Inp label="Operador responsável" value={f.operador} onChange={e=>set("operador",e.target.value)} placeholder="Nome do operador"/></div>
        </div>
      </div>
      <div style={{background:C.g50,borderRadius:10,padding:16}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>📦 Serviço</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}>
            <Sel label="Serviço *" value={f.servico} onChange={e=>{set("servico",e.target.value);set("valor",PRECOS[e.target.value]||0);}} options={SERVICOS}/>
          </div>
          <Inp label="Valor (R$)" type="number" value={f.valor} onChange={e=>set("valor",e.target.value)}/>
          <Inp label="Desconto (R$)" type="number" value={f.desc} onChange={e=>set("desc",e.target.value)}/>
          <div style={{gridColumn:"1/-1",background:C.greenL,border:"1px solid "+C.green+"33",borderRadius:8,
            padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:C.green,fontWeight:600}}>💰 Valor Final</span>
            <span style={{fontSize:18,fontWeight:700,color:C.green}}>{moeda(vf)}</span>
          </div>
          <Sel label="Forma de Pagamento" value={f.forma} onChange={e=>set("forma",e.target.value)} options={FORMAS}/>
          <Sel label="Status Pagamento" value={f.stPgto} onChange={e=>set("stPgto",e.target.value)} options={S_PGTO.map(s=>({v:s.l,t:s.i+" "+s.l}))}/>
        </div>
      </div>
      <div style={{background:C.g50,borderRadius:10,padding:16}}>
        <div style={{fontWeight:700,fontSize:13,color:C.navy,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>📅 Datas e Status</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Data do Pedido" type="date" value={f.dataPed} onChange={e=>set("dataPed",e.target.value)}/>
          <Inp label="Prazo de Entrega" type="date" value={f.prazo} onChange={e=>set("prazo",e.target.value)}/>
          <Sel label="Status do Serviço" value={f.stServ} onChange={e=>set("stServ",e.target.value)} options={S_SERV.map(s=>({v:s.l,t:s.i+" "+s.l}))}/>
          <Inp label="Data Entrega Real" type="date" value={f.entregaReal} onChange={e=>set("entregaReal",e.target.value)}/>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:12,fontWeight:600,color:C.g600,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:4}}>Observações</label>
            <textarea value={f.obs} onChange={e=>set("obs",e.target.value)} placeholder="Área de atuação, detalhes..."
              onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.g200}
              style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid "+C.g200,
                fontSize:14,fontFamily:"inherit",resize:"vertical",minHeight:70,outline:"none",boxSizing:"border-box"}}/>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <Btn v="gh" onClick={onCancel}>Cancelar</Btn>
        <Btn v="gold" onClick={()=>{if(!f.nome.trim()){alert("Informe o nome.");return;}onSave({...f,valor:Number(f.valor),desc:Number(f.desc)});}}>💾 Salvar Pedido</Btn>
      </div>
    </div>
  );
}
 
function Card({p,onEdit,onDel,onView,isAdmin}){
  const vf=p.valor-(p.desc||0);
  const atrasado=p.prazo&&p.prazo<hoje()&&p.stServ!=="Concluído"&&p.stServ!=="Cancelado";
  return (
    <div onMouseEnter={e=>e.currentTarget.style.boxShadow="0 8px 24px rgba(15,36,69,.15)"}
      onMouseLeave={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(15,36,69,.07)"}
      style={{background:C.white,borderRadius:12,border:"1.5px solid "+(atrasado?C.red:C.g200),
        overflow:"hidden",boxShadow:"0 2px 8px rgba(15,36,69,.07)",transition:"box-shadow .2s"}}>
      <div style={{background:C.navy,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:11,color:C.gold,fontWeight:600,letterSpacing:1}}>{p.id}</div>
          <div style={{fontWeight:700,fontSize:15,color:C.white}}>{p.nome}</div>
          {p.idade&&<div style={{fontSize:12,color:C.g400}}>🎂 {p.idade} anos</div>}
        </div>
        {isAdmin?(
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:700,color:C.goldL}}>{moeda(vf)}</div>
            {p.desc>0&&<div style={{fontSize:11,color:C.g400,textDecoration:"line-through"}}>{moeda(p.valor)}</div>}
          </div>
        ):<div style={{fontSize:11,color:"#ffffff55",background:"#ffffff11",padding:"4px 8px",borderRadius:6}}>🔒 restrito</div>}
      </div>
      <div style={{padding:"12px 16px"}}>
        <div style={{fontSize:13,fontWeight:600,color:C.navy,marginBottom:10}}>📦 {p.servico}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          <Badge status={p.stServ} tipo="serv"/>
          {isAdmin&&<Badge status={p.stPgto} tipo="pgto"/>}
          {atrasado&&<span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,
            fontSize:12,fontWeight:600,color:C.red,background:C.redL,border:"1px solid "+C.red+"44"}}>🚨 Atrasado</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,fontSize:12,color:C.g600}}>
          {p.tel&&<span>📱 {p.tel}</span>}
          {p.cidade&&<span>📍 {p.cidade}</span>}
          <span>📅 {fdata(p.dataPed)}</span>
          {p.prazo&&<span>🎯 {fdata(p.prazo)}</span>}
          {isAdmin&&p.forma&&<span>💳 {p.forma}</span>}
          {p.indicado&&<span>🔗 {p.indicado}</span>}
          {p.operador&&<span style={{gridColumn:"1/-1"}}>👤 <strong>{p.operador}</strong></span>}
        </div>
        {p.obs&&<div style={{marginTop:8,padding:"6px 10px",background:C.g50,borderRadius:6,
          fontSize:12,color:C.g600,borderLeft:"3px solid "+C.gold}}>{p.obs}</div>}
      </div>
      <div style={{padding:"10px 16px",borderTop:"1px solid "+C.g100,display:"flex",gap:8,justifyContent:"flex-end"}}>
        <Btn sm v="gh" onClick={()=>onView(p)}>👁️ Ver</Btn>
        <Btn sm v="out" onClick={()=>onEdit(p)}>✏️ Editar</Btn>
        {isAdmin&&<Btn sm v="dan" onClick={()=>onDel(p.id)}>🗑️</Btn>}
      </div>
    </div>
  );
}
 
function Detalhe({p,onClose,onEdit,isAdmin}){
  const vf=p.valor-(p.desc||0);
  const R=({l,v})=>v?<div style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"1px solid "+C.g100}}>
    <span style={{fontSize:12,color:C.g600,fontWeight:600,minWidth:140}}>{l}</span>
    <span style={{fontSize:13,color:C.g800}}>{v}</span></div>:null;
  return (
    <Modal title={"📋 "+p.id} onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div style={{background:C.navy,borderRadius:10,padding:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:C.white}}>{p.nome}</div>
            <div style={{fontSize:13,color:C.gold}}>{p.servico}</div>
            {p.idade&&<div style={{fontSize:12,color:C.g400}}>🎂 {p.idade} anos</div>}
          </div>
          {isAdmin&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:22,fontWeight:700,color:C.goldL}}>{moeda(vf)}</div>
            {p.desc>0&&<div style={{fontSize:12,color:C.g400}}>Desc: {moeda(p.desc)}</div>}
          </div>}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Badge status={p.stServ} tipo="serv"/>
          {isAdmin&&<Badge status={p.stPgto} tipo="pgto"/>}
        </div>
        <div>
          <R l="🎂 Idade" v={p.idade?p.idade+" anos":null}/>
          <R l="📱 Telefone" v={p.tel}/><R l="📧 E-mail" v={p.email}/>
          <R l="📍 Cidade" v={p.cidade}/>
          {isAdmin&&<R l="💳 Pagamento" v={p.forma}/>}
          <R l="📅 Data Pedido" v={fdata(p.dataPed)}/>
          <R l="🎯 Prazo" v={fdata(p.prazo)}/><R l="✅ Entrega Real" v={fdata(p.entregaReal)}/>
          <R l="🔗 Indicado por" v={p.indicado}/><R l="👤 Operador" v={p.operador}/>
          <R l="📝 Obs" v={p.obs}/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn v="gh" onClick={onClose}>Fechar</Btn>
          <Btn v="gold" onClick={()=>{onClose();onEdit(p);}}>✏️ Editar</Btn>
        </div>
      </div>
    </Modal>
  );
}
 
function AvisosPrazo({peds,onVerPedido,users}){
  const hj=hoje();
  const atrasados=peds.filter(p=>p.prazo&&p.prazo<hj&&p.stServ!=="Concluído"&&p.stServ!=="Cancelado");
  const proximos=peds.filter(p=>{
    if(!p.prazo||p.stServ==="Concluído"||p.stServ==="Cancelado") return false;
    const d=diasPara(p.prazo); return d>=0&&d<=2;
  });
  if(atrasados.length===0&&proximos.length===0) return null;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
      {atrasados.length>0&&(
        <div style={{background:C.redL,border:"1.5px solid "+C.red+"55",borderRadius:12,padding:"14px 18px"}}>
          <div style={{fontWeight:700,fontSize:14,color:C.red,marginBottom:10}}>🚨 Pedidos Atrasados ({atrasados.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {atrasados.map(p=>(
              <div key={p.id} onClick={()=>onVerPedido(p)}
                onMouseEnter={e=>e.currentTarget.style.background="#fce8e8"}
                onMouseLeave={e=>e.currentTarget.style.background=C.white}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  background:C.white,borderRadius:8,padding:"8px 14px",border:"1px solid "+C.red+"22",cursor:"pointer"}}>
                <div>
                  <span style={{fontWeight:600,color:C.red}}>{p.nome}</span>
                  <span style={{fontSize:12,color:C.g600,marginLeft:8}}>{p.servico}</span>
                  {p.operador&&<span style={{fontSize:12,color:C.g600,marginLeft:8}}>· 👤 {p.operador}</span>}
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:12,display:"flex",alignItems:"center",gap:8}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:C.red}}>Prazo: {fdata(p.prazo)}</div>
                    <Badge status={p.stServ} tipo="serv"/>
                  </div>
                  {usuarioPorNome(users,p.operador)?.whatsapp&&<a onClick={e=>e.stopPropagation()} href={linkWhats(usuarioPorNome(users,p.operador).whatsapp)} target="_blank"

function csvCell(v){
  const txt=String(v??"").replace(/"/g,'""');
  return '"'+txt+'"';
}
function exportarClientesCSV(lista,nomeArquivo="backup_clientes_rbe_select.csv"){
  const cab=["ID","Cliente","Idade","Telefone","E-mail","Cidade/UF","Serviço","Valor","Desconto","Valor Final","Forma Pagamento","Status Pagamento","Status Serviço","Data Pedido","Prazo","Entrega Real","Indicado por","Operador","Observações"];
  const linhas=(lista||[]).map(p=>[
    p.id,p.nome,p.idade,p.tel,p.email,p.cidade,p.servico,p.valor,p.desc,valorFinal(p),p.forma,p.stPgto,p.stServ,p.dataPed,p.prazo,p.entregaReal,p.indicado,p.operador,p.obs
  ]);
  const csv="\ufeff"+[cab,...linhas].map(l=>l.map(csvCell).join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=nomeArquivo;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function Faturamento({peds}){
  const anoAtual=new Date().getFullYear();

  if(!anos.includes(String(anoAtual))) anos.unshift(String(anoAtual));
  const [anoSel,setAnoSel]=useState(String(anoAtual));
  const mesAtualIdx=new Date().getMonth();
  const dadosMes=MESES.map((nome,i)=>{
    const pfx=anoSel+"-"+String(i+1).padStart(2,"0");
    const mp=peds.filter(p=>p.dataPed?.startsWith(pfx));
    const pagos=mp.filter(p=>p.stPgto==="Pago").reduce((s,p)=>s+(p.valor-(p.desc||0)),0);
    const pend=mp.filter(p=>p.stPgto==="Pendente").reduce((s,p)=>s+(p.valor-(p.desc||0)),0);
    const total=mp.reduce((s,p)=>s+(p.valor-(p.desc||0)),0);
    return {nome,pagos,pend,total,q:mp.length};
  });
  const maxVal=Math.max(...dadosMes.map(d=>d.total),1);
  const totalFat=dadosMes.reduce((s,d)=>s+d.pagos,0);
  const totalPend=dadosMes.reduce((s,d)=>s+d.pend,0);
  const melhor=[...dadosMes].sort((a,b)=>b.total-a.total)[0];
  const mesesAtivos=dadosMes.filter(d=>d.q>0).length;
  const media=mesesAtivos>0?totalFat/mesesAtivos:0;

        <Kpi label="Mês Atual" valor={moeda(dadosMes[mesAtualIdx].total)} icon="📅" cor={C.blue} sub={dadosMes[mesAtualIdx].q+" pedido(s)"}/>

      <div style={{display:"flex",gap:8,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontWeight:700,color:C.navy,fontSize:14}}>📆 Ano:</span>
        {anos.map(a=>(
          <button key={a} onClick={()=>setAnoSel(a)}

        <div style={{display:"flex",alignItems:"flex-end",gap:5,height:150,marginBottom:8}}>
          {dadosMes.map((d,i)=>{
            const hP=d.pagos/maxVal*130; const hN=d.pend/maxVal*130;

        </div>
      </div>
    </div>
  );

          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {aba==="pedidos"&&<Btn v="gh" onClick={()=>exportarClientesCSV(peds)}>⬇️ Backup Excel</Btn>}
            {aba==="pedidos"&&<Btn v="gold" onClick={()=>setModalNovo(true)}>+ Novo Pedido</Btn>}
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:13,fontWeight:600,color:C.white}}>{session.name}</div>
              <div style={{fontSize:11,color:C.g400}}>{isAdmin?"👑 Admin":"👤 Operador"}</div>
            </div>
            <Btn sm v="gh" onClick={logout} style={{background:"transparent",border:"1px solid #ffffff33",color:C.g400}}>Sair</Btn>
          </div>
        </div>
      </div>
      <div style={{maxWidth:1140,margin:"0 auto",padding:24}}>
        {aba==="pedidos"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:14,marginBottom:24}}>
          <Kpi label="Total Pedidos" valor={peds.length} icon="📦" cor={C.navy}/>
          <Kpi label="Em Andamento" valor={andam} icon="🔄" cor={C.blue}/>
          <Kpi label="Concluídos" valor={concl} icon="✅" cor={C.green}/>
          {atras>0&&<Kpi label="Atrasados" valor={atras} icon="🚨" cor={C.red}/>}
        </div>}
        {aba==="pedidos"&&<>
          <AvisosPrazo peds={peds} onVerPedido={setDetalhe} users={users}/>
          <div style={{background:C.white,borderRadius:12,padding:"14px 18px",marginBottom:20,border:"1px solid "+C.g200,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontWeight:700,color:C.navy,fontSize:14}}>⬇️ Backup dos clientes</div>
              <div style={{fontSize:12,color:C.g600}}>Baixe uma planilha CSV compatível com Excel com todos os clientes e informações cadastradas.</div>
            </div>
            <Btn v="gold" onClick={()=>exportarClientesCSV(peds)}>Baixar Excel/CSV</Btn>
          </div>
          <div style={{background:C.white,borderRadius:12,padding:"14px 18px",marginBottom:20,
            display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",border:"1px solid "+C.g200}}>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar nome, ID, telefone..."
              onFocus={e=>e.target.style.borderColor=C.gold} onBlur={e=>e.target.style.borderColor=C.g200}
              style={{flex:1,minWidth:200,padding:"8px 12px",borderRadius:8,border:"1.5px solid "+C.g200,fontSize:14,fontFamily:"inherit",outline:"none"}}/>
            <Sel value={fSt} onChange={e=>setFSt(e.target.value)} options={["Todos",...S_SERV.map(s=>s.l)].map(s=>({v:s,t:s}))}/>
            <Sel value={fServ} onChange={e=>setFServ(e.target.value)} options={[{v:"Todos",t:"Todos os serviços"},{v:"Currículo",t:"Currículo"},{v:"LinkedIn",t:"LinkedIn"},{v:"Pacote",t:"Pacote"},{v:"site",t:"Cadastro em Sites"}]}/>
            {operadores.length>0&&<Sel value={fOp} onChange={e=>setFOp(e.target.value)} options={["Todos",...operadores].map(s=>({v:s,t:s}))}/>}
            <Sel value={fMes} onChange={e=>setFMes(e.target.value)} options={[{v:"Todos",t:"Todos os meses"},...MESES.map((m,i)=>({v:String(i+1).padStart(2,"0"),t:m}))]}/>
            <Sel value={fAno} onChange={e=>setFAno(e.target.value)} options={[{v:"Todos",t:"Todos os anos"},...anosFiltro.map(a=>({v:a,t:a}))]}/>
            <span style={{fontSize:13,color:C.g600,whiteSpace:"nowrap"}}>{filtrados.length} pedido(s)</span>
          </div>
          {filtrados.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:48,marginBottom:12}}>{peds.length===0?"📋":"🔍"}</div>
              <div style={{fontSize:18,color:C.navy,marginBottom:16}}>{peds.length===0?"Nenhum pedido ainda":"Nenhum resultado"}</div>
              {peds.length===0&&<Btn v="gold" onClick={()=>setModalNovo(true)}>+ Cadastrar Primeiro Pedido</Btn>}
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
              {filtrados.map(p=><Card key={p.id} p={p} onEdit={setEditando} onDel={excluir} onView={setDetalhe} isAdmin={isAdmin}/>)}
            </div>
          )}
        </>}
        {aba==="dashboard"&&<Dashboard peds={peds} isAdmin={isAdmin}/>}
        {aba==="faturamento"&&isAdmin&&<FaturamentoGate adminPass={users.admin?.pass||"admin123"}><Faturamento peds={peds}/></FaturamentoGate>}
        {aba==="config"&&isAdmin&&<Configuracoes users={users} onSave={u=>setUsers(u)}/>}
      </div>
      {(modalNovo||editando)&&(
        <Modal title={editando?"✏️ Editar — "+editando.nome:"➕ Novo Pedido"} onClose={()=>{setModalNovo(false);setEditando(null);}}>
          <FormPedido ini={editando} onSave={salvar} onCancel={()=>{setModalNovo(false);setEditando(null);}} currentUser={session}/>
        </Modal>
      )}
      {detalhe&&<Detalhe p={detalhe} onClose={()=>setDetalhe(null)} onEdit={p=>{setDetalhe(null);setEditando(p);}} isAdmin={isAdmin}/>}
    </div>
  );
}
 
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
